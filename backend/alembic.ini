# Alembic config for Korb API. Run from apps/api: uv run alembic upgrade head
# From repo root: pnpm db:migrate (uses root .env for DATABASE_URL)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Date-prefixed filenames for chronological sort (e.g. 20250310_abc123_add_users.py)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
